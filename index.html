<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lead Finder Pro</title>
    
    <link rel="manifest" href='data:application/manifest+json,{"name":"Lead Finder Pro","short_name":"LeadFinder","start_url":".","display":"standalone","background_color":"#0b0f1a","theme_color":"#2563eb","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/2913/2913990.png","sizes":"512x512","type":"image/png"}]}'>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            color: white; 
            -webkit-tap-highlight-color: transparent;
            /* استخدام صورة خلفية من رابط موثوق وسريع التحميل */
            background-image: url('https://images.pexels.com/photos/271639/pexels-photo-271639.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=2');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #0b0f1a;
        }
        
        /* طبقة تظليل داكنة قوية لضمان ظهور المحتوى بوضوح */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.75) 0%, rgba(15, 23, 42, 0.92) 100%);
            z-index: -1;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 2rem;
        }

        .bottom-nav { 
            background: rgba(15, 23, 42, 0.85); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.1); 
        }

        input {
            background: rgba(15, 23, 42, 0.6) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }

        .btn-glow {
            background: linear-gradient(90deg, #2563eb 0%, #1d4ed8 100%);
            box-shadow: 0 8px 15px -5px rgba(37, 99, 235, 0.5);
        }
    </style>
</head>
<body class="pb-28 min-h-screen">

    <header class="p-8 pt-16 text-right relative z-10">
        <div class="flex justify-between items-center mb-6">
            <span class="bg-blue-600 px-3 py-1 rounded-full text-[10px] font-bold tracking-widest">LEAD FINDER PRO</span>
            <div class="w-12 h-12 rounded-2xl bg-blue-500/20 border border-blue-500/30 flex items-center justify-center font-bold text-blue-400">AD</div>
        </div>
        <h1 class="text-4xl font-extrabold text-white">رادار المبيعات</h1>
        <p class="text-slate-300 text-sm mt-1 italic">خاص بصديقي أحمد ديسوقي</p>
    </header>

    <section class="px-6 mb-8 relative z-10 text-right">
        <div class="glass-card p-5">
            <label class="block text-xs font-bold text-blue-400 mb-2 px-1">نطاق الشركة (Domain)</label>
            <input type="text" id="companyInput" placeholder="مثال: saudia.com" 
                   class="w-full rounded-2xl py-5 px-6 outline-none focus:border-blue-500 transition-all text-lg font-medium">
            <button onclick="globalSearch()" class="w-full mt-4 btn-glow text-white py-5 rounded-2xl font-extrabold text-lg active:scale-95 transition-all">
                بدء الاستهداف الذكي 🛰️
            </button>
        </div>
    </section>

    <section class="px-6 relative z-10">
        <div class="grid grid-cols-2 gap-4">
            <div onclick="searchLinkedIn('Procurement OR Purchasing Manager')" class="glass-card p-6 flex flex-col items-center text-center active:scale-90 transition-transform">
                <div class="w-12 h-12 bg-blue-600/20 rounded-xl flex items-center justify-center mb-3 text-blue-400 font-black">in</div>
                <span class="text-xs font-bold">المشتريات</span>
            </div>
            <div onclick="searchLinkedIn('Travel OR HR OR General Services')" class="glass-card p-6 flex flex-col items-center text-center active:scale-90 transition-transform">
                <div class="w-12 h-12 bg-green-600/20 rounded-xl flex items-center justify-center mb-3 text-green-400">✈️</div>
                <span class="text-xs font-bold">منسقو السفر</span>
            </div>
            <div onclick="searchEmails()" class="glass-card p-6 flex flex-col items-center text-center active:scale-90 transition-transform">
                <div class="w-12 h-12 bg-purple-600/20 rounded-xl flex items-center justify-center mb-3 text-purple-400">📧</div>
                <span class="text-xs font-bold">صائد الإيميلات</span>
            </div>
            <div onclick="window.location.reload()" class="glass-card p-6 flex flex-col items-center text-center active:scale-90 transition-transform">
                <div class="w-12 h-12 bg-slate-600/20 rounded-xl flex items-center justify-center mb-3 text-slate-300">🔄</div>
                <span class="text-xs font-bold">تحديث</span>
            </div>
        </div>
    </section>

    <nav class="bottom-nav fixed bottom-0 left-0 right-0 px-10 py-6 flex justify-between items-center z-50 rounded-t-[2.5rem] shadow-2xl">
        <button class="flex flex-col items-center gap-1 text-blue-500">
            <span class="text-2xl">🏠</span>
            <span class="text-[10px] font-bold uppercase tracking-widest">الرئيسية</span>
        </button>
        <button onclick="alert('Park Inn Jeddah Tool V2.1')" class="flex flex-col items-center gap-1 text-slate-500">
            <span class="text-2xl">📊</span>
            <span class="text-[10px] font-bold uppercase tracking-widest">البيانات</span>
        </button>
    </nav>

    <script>
        function getCompany() {
            const domain = document.getElementById('companyInput').value.trim();
            if(!domain) { alert('صديقي أحمد، يرجى كتابة الدومين أولاً'); return null; }
            return domain;
        }

        function globalSearch() {
            const domain = getCompany();
            if(!domain) return;
            searchLinkedIn('Decision Maker OR Procurement');
        }

        function searchLinkedIn(role) {
            const domain = getCompany();
            if(!domain) return;
            const query = `site:linkedin.com/in/ "${domain}" "${role}"`;
            window.open(`https://www.google.com/search?q=${encodeURIComponent(query)}`, '_blank');
        }

        function searchEmails() {
            const domain = getCompany();
            if(!domain) return;
            const query = `"${domain}" email format OR "@${domain}"`;
            window.open(`https://www.google.com/search?q=${encodeURIComponent(query)}`, '_blank');
        }
    </script>
</body>
</html>
