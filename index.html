<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مستخرج بيانات العملاء | Lead Finder Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f1f5f9; }
        .hero-bg { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
    </style>
</head>
<body>

    <nav class="bg-white border-b border-gray-200 p-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-xl">L</div>
                <span class="text-xl font-bold text-gray-800 tracking-tight">Lead Finder <span class="text-blue-600">Pro</span></span>
            </div>
            <div class="hidden md:block">
                <span class="bg-blue-50 text-blue-700 px-3 py-1 rounded-full text-sm font-bold border border-blue-100">لوحة مبيعات - أحمد</span>
            </div>
        </div>
    </nav>

    <header class="hero-bg text-white py-20 px-4 shadow-inner">
        <div class="max-w-4xl mx-auto text-center">
            <h1 class="text-4xl md:text-5xl font-extrabold mb-6 leading-tight">استخراج بيانات الموظفين بذكاء</h1>
            <p class="text-lg mb-10 text-gray-300">أدخل اسم الشركة لجلب قائمة صانعي القرار، المسميات الوظيفية، والبريد الإلكتروني من LinkedIn و Google.</p>
            
            <div class="bg-white p-3 rounded-2xl shadow-2xl flex flex-col md:flex-row gap-3">
                <input type="text" id="companyInput" placeholder="اكتب اسم الشركة (مثال: Aramco أو STC)" class="flex-1 px-6 py-4 text-gray-800 rounded-xl focus:outline-none text-lg border border-gray-100">
                <button onclick="runDiscovery()" class="bg-blue-600 hover:bg-blue-700 text-white px-12 py-4 rounded-xl font-bold transition-all transform hover:scale-105 shadow-lg">
                    بحث متقدم
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto py-12 px-4">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200">
            <div class="p-6 border-b border-gray-100 flex flex-col md:flex-row justify-between items-center gap-4">
                <h2 class="font-bold text-2xl text-gray-800">قائمة العملاء المحتملين</h2>
                <button onclick="downloadExcel()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-xl font-bold transition flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    استخراج إلى Excel
                </button>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-right border-collapse">
                    <thead>
                        <tr class="bg-gray-50 text-gray-500 text-sm">
                            <th class="p-5 font-bold border-b">الموظف</th>
                            <th class="p-5 font-bold border-b">المسمى الوظيفي</th>
                            <th class="p-5 font-bold border-b">البريد الإلكتروني</th>
                            <th class="p-5 font-bold border-b">المنطقة</th>
                            <th class="p-5 font-bold border-b">LinkedIn</th>
                        </tr>
                    </thead>
                    <tbody id="resultsTable" class="text-gray-700 divide-y divide-gray-50">
                        <tr>
                            <td class="p-5 font-bold">بانتظار إدخال اسم الشركة...</td>
                            <td class="p-5">---</td>
                            <td class="p-5">---</td>
                            <td class="p-5">---</td>
                            <td class="p-5">---</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        function runDiscovery() {
            const co = document.getElementById('companyInput').value;
            if(!co) return alert('أدخل اسم الشركة أولاً');
            
            const table = document.getElementById('resultsTable');
            table.innerHTML = `<tr><td colspan="5" class="p-10 text-center"><div class="animate-spin inline-block w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full"></div> <p class="mt-2 text-blue-600">جاري مسح الويب لجلب بيانات ${co}...</p></td></tr>`;

            // الخطوة التالية هي ربط API حقيقي هنا
            setTimeout(() => {
                alert('الواجهة جاهزة! في الخطوة القادمة سنربطها بمحرك Apollo.io لجلب البيانات الحقيقية.');
            }, 1500);
        }
        function downloadExcel() { alert('سيتم تصدير الجدول بصيغة Excel'); }
    </script>
</body>
</html>
